server:
  port: 8085
  servlet:
    context-path: /realman-iot
  # framework 会启用 ForwardedHeaderFilter，在部分反代链路与 WebSocket 握手组合下可能导致 Upgrade 等头异常；按需改为 framework
  forward-headers-strategy: none


spring:
  application:
    name: realman-iot
  cloud:
    nacos:
      config:
        # 必须在主 application.yml 中配置，否则 NacosConfigData 解析 import 时 server-addr 未就绪，会报 config is empty
        server-addr: ${NACOS_SERVER_ADDR:realman-nacos:8848}
        # 与 Nacos 控制台「Group」一致；DataId 为 ${spring.application.name}.yaml
        group: ${NACOS_GROUP:REALMAN_GROUP}
        # 与 DataId 后缀一致；不指定时部分版本默认按 properties 处理导致拉错/为空
        file-extension: yaml
        # 2.x 默认开启鉴权时须与控制台账号一致，否则易拉取失败、日志里表现为 empty
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        refresh-enabled: true
        # 命名空间填控制台「Namespace ID」；使用 public 时请勿填 public 字样，直接省略本项
        # namespace: ${NACOS_NAMESPACE:}
  config:
    import:
      # liteflow 等本地片段
      - optional:classpath:config/application-liteflow.yml
      # 远程配置：DataId/Group/Namespace 以 spring.cloud.nacos.config 为准（勿在 import URI 中写未解析的占位符）
      - optional:nacos:${spring.application.name}.yaml?refreshEnabled=true
  profiles:
    active: '@profile.name@'

# ===== 分布式链路追踪（P0/P1） =====
management:
  tracing:
    sampling:
      # 采样率：开发/测试 100%，生产通过环境变量 TRACE_SAMPLING=0.1 覆盖
      probability: ${TRACE_SAMPLING:1.0}
    propagation:
      # B3 Multi Header 格式，兼容 Zipkin 和 Brave；与 Micrometer Tracing 默认行为一致
      type: B3_MULTI
  zipkin:
    tracing:
      # Zipkin 上报地址，Docker 环境改为容器名；本地开发直接用 localhost
      endpoint: ${ZIPKIN_ENDPOINT:http://172.16.44.66:9411/api/v2/spans}

# Loki 推送地址（供 logback-spring.xml 的 <springProperty> 读取）
loki:
  url: ${LOKI_URL:http://172.16.44.66:3100/loki/api/v1/push}