server:
  port: 8085
  servlet:
    context-path: /device-mgmt

spring:
  application:
    name: device-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iot_device_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: your_password_here
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# ─────── MQTT/EMQX ───────────────────────────────────────────────────────
mqtt:
  broker:
    url: tcp://localhost:1883
    # 平台服务账号（在EMQX中单独配置，允许访问所有Topic）
    username: platform
    password: platform_secret
    client-id: iot-platform-server
    qos: 1
    keep-alive: 60

# ─────── MinIO ────────────────────────────────────────────────────────────
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: iot-firmware
  url-expire-days: 7

# ─────── XXL-Job ──────────────────────────────────────────────────────────
xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: device-executor
      port: 9999
    accessToken: xxl-job-default-token

# ─────── 设备安全配置 ─────────────────────────────────────────────────────
# 鉴权模型：设备通过deviceSecret直连EMQX（连接层鉴权），消息体不携带鉴权信息
# per-device AES Key = SHA256(master-key + ":" + deviceSecret)[0..31]
device:
  encrypt:
    # 生产环境通过环境变量注入：-DDEVICE_ENCRYPT_MASTER_KEY=xxx 或 export DEVICE_ENCRYPT_MASTER_KEY=xxx
    master-key: ${DEVICE_ENCRYPT_MASTER_KEY:iot-platform-master-key-32bytes!!}
    enabled: true
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

# ─────── 日志 ─────────────────────────────────────────────────────────────
logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN
