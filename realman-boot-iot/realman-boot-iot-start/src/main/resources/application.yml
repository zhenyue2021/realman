server:
  port: 8085
  servlet:
    context-path: /realman-iot

spring:
  application:
    name: device-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jeecg-boot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: embedded
    auto-startup: true
    startup-delay: 1s
    overwrite-existing-jobs: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MyScheduler
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: true
            misfireThreshold: 12000
            clusterCheckinInterval: 15000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

mqtt:
  enabled: true  # 临时禁用，避免启动失败
  broker:
    url: tcp://172.16.44.66:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 60

minio:
  endpoint: http://172.16.44.66:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name: iot-firmware
  url-expire-days: 7

xxl:
  job:
    admin:
      addresses: http://127.0.0.1:9080/xxl-job-admin
    executor:
      appname: device-executor
      port: 9999
    accessToken: xxl-job-default-token

device:
  encrypt:
    enabled: true
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN
