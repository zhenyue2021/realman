server:
  port: 8085
  servlet:
    context-path: /realman-iot

spring:
  application:
    name: realman-iot
  cloud:
    nacos:
      config:
        # 与 Nacos 控制台「Group」一致；DataId 一般为 ${spring.application.name}.yaml
        group: REALMAN_GROUP
        refresh-enabled: true
  config:
    import:
      # liteflow 等本地片段
      - optional:classpath:config/application-liteflow.yml
      # 远程配置变更会触发 Refresh；消费 @Value 的类需配合 @RefreshScope 才拿到新值
      - optional:nacos:${spring.application.name}.yaml?refreshEnabled=true
  profiles:
    active: '@profile.name@'

# ===== 分布式链路追踪（P0/P1） =====
management:
  tracing:
    sampling:
      # 采样率：开发/测试 100%，生产通过环境变量 TRACE_SAMPLING=0.1 覆盖
      probability: ${TRACE_SAMPLING:1.0}
    propagation:
      # B3 Multi Header 格式，兼容 Zipkin 和 Brave；与 Micrometer Tracing 默认行为一致
      type: B3_MULTI
  zipkin:
    tracing:
      # Zipkin 上报地址，Docker 环境改为容器名；本地开发直接用 localhost
      endpoint: ${ZIPKIN_ENDPOINT:http://172.16.44.66:9411/api/v2/spans}

# Loki 推送地址（供 logback-spring.xml 的 <springProperty> 读取）
loki:
  url: ${LOKI_URL:http://172.16.44.66:3100/loki/api/v1/push}