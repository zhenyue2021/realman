
spring:
  application:
    name: realman-iot-szy
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: 172.16.44.66:8848
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:REALMAN_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: 172.16.44.66:8848
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:REALMAN_GROUP}
        file-extension: yaml
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.16.44.66:3306/jeecg-boot?characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: 172.16.44.66
      port: 6379
      password:
      database: 0
      timeout: 3000              # 命令超时 3s，防止 pipeline 连接 zombie 时线程永久阻塞
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
          max-wait: 2000         # 等待空闲连接超时 2s（连接池耗尽时快速失败）
        shutdown-timeout: 200ms  # 关闭时等待 200ms 让进行中的命令完成
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# RocketMQ（阿里云消息队列 RocketMQ 版 5.x，实例 rmq-cn-jjw4iubgh07，北京区域）
# 使用 rocketmq-v5-client-spring-boot-starter，通过 gRPC 端点（:8080）连接
rocketmq:
  producer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44
    topic: daily_GLN_PLATFORM
    ssl-enabled: true
    max-attempts: 3
    request-timeout: 3
  push-consumer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44

# 设为 true 时加载 Darwin RocketMQ Bean；未部署 RocketMQ 时请保持 false 或使用环境变量覆盖
darwin:
  integration:
    enabled: false
    # 双写切换开关：false 走 RocketMQ（默认），true 走下方 http 配置的同步 HTTP 直连，
    # 见 org.jeecg.modules.device.datacollect.http.DarwinHttpClient。
    # 真实契约（路径/字段/鉴权）尚未与达尔文平台侧确认，灰度验证前不要开启。
    http-enabled: false
    http:
      base-url: ""
      api-key-header: "X-Darwin-Api-Key"
      api-key: ""
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
    auto-submit-minutes: 10   # Darwin 工单开启后超时自动提交阈值（分钟），0=禁用
    default-department-id: "1958496759810363394"
    default-department-name: "城市运营管理集团有限公司"

# mqtt
mqtt:
  enabled: false  # 临时禁用，避免启动失败
  high-freq-throttle-ms: 500  # slam/states 等高频 Topic 节流间隔(ms)：500=2次/秒，1000=1次/秒，0=不限
  collect-url-request-dedup-ms: 60000
  collect-url-device-throttle-ms: 45000
  collect-url-sts-cache-buffer-seconds: 300
  collect-url-sts-cache-default-ttl-seconds: 3600
  collect-url-inflight-timeout-seconds: 60
  sys-event-idempotent-seconds: 15   # $SYS 上下线多 Pod 幂等窗口(秒)
  status-offline-promote-throttle-ms: 60000  # keepalive DB 离线→在线 提交节流(ms)
  emqx:
    api-url: http://172.16.44.66:18083   # 留空则从 mqtt.broker.url 推导 http://host:18083
    api-username: 1f36cde522c1f8ab
    api-password: vtsY7uLXarr2xeuCjJCDwq7etrBSbrcbSwj59B9AuZHtF
    api-timeout-ms: 5000
    reconcile-enabled: true
    reconcile-lock-seconds: 120
    reconcile-sidefx-idempotent-seconds: 60
  watchdog:
    idle-timeout-seconds: 90  # 空闲超时(秒)=心跳间隔45s×2；须 < 设备离线判定阈值 300s
  broker:
    url: tcp://172.16.44.66:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 30

# 文件存储
minio:
  endpoint: http://172.16.44.66:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name:
    firmware: iot-firmware
    slam: iot-slam
  url-expire-days: 7

# 定时任务
xxl:
  job:
    enabled: true
    admin:
      addresses: http://172.16.44.66:9080/xxl-job-admin
    executor:
      appname: ${spring.application.name}
      port: 30007
    accessToken:

jeecg:
  shiro:
    excludeUrls: /internal/mqtt/**,/internal/device/**,/api/ota/**

device:
  encrypt:
    enabled: false
  master:
    allow-default-device-code: true
  provision:
    enabled: true
    timestamp-skew-seconds: 300
    default-tenant-id: 1000
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

# Zipkin 链路数据清理策略
zipkin:
  cleanup:
    retention-days: 7        # 保留最近 N 天的链路数据，超期物理删除
    database: zipkin          # Zipkin 所在的 MySQL 数据库名
    batch-size: 5000          # 每批删除行数，避免大事务锁表

# IoT 日志归档（指令记录 / 操作日志 / MQ 消息日志）
iot:
  log:
    archive:
      retention-days: 90           # 主表保留天数（约 3 个月）
      history-retention-days: 365  # 历史表保留天数（按 backup_time）
      batch-size: 2000             # 每批归档/删除行数

# WebRTC 服务配置（TURN 凭证 + turn_router 动态调度）
webrtc:
  turn-server:
    username: "realman"
    password: "TBdWj0HhwTK56AzK"
  signaling:
    server:
      port: 8091
  turn-router:
    base-url: "http://8.141.21.23:8081"
    connect-timeout-ms: 5000
    read-timeout-ms: 5000

logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN

# ===== 链路追踪（开发环境） =====
# 100% 采样率已在 application.yml 中设为默认值，此处无需重复。
