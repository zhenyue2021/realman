
spring:
  application:
    name: realman-iot-szy
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: 172.16.44.66:8848   # Nacos 地址
        namespace: public                # 先用 public，后面需要再拆 namespace
        group: REALMAN_GROUP             # 可自定义，比如 REALMAN_GROUP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.16.44.66:3306/jeecg-boot?characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: 172.16.44.66
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# mqtt
mqtt:
  enabled: false  # 临时禁用，避免启动失败
  broker:
    url: tcp://172.16.44.66:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 60

# 文件存储
minio:
  endpoint: http://172.16.44.66:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name:
    firmware: iot-firmware
    slam: iot-slam
  url-expire-days: 7

# 定时任务
xxl:
  job:
    enabled: true
    admin:
      addresses: http://172.16.44.66:9080/xxl-job-admin
    executor:
      appname: ${spring.application.name}
      port: 30007
    accessToken:

jeecg:
  shiro:
    excludeUrls: /internal/mqtt/**,/api/device/**,/api/ota/**

device:
  encrypt:
    enabled: false
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

# WebRTC 服务配置（TURN / STUN 服务器，下发给机器人设备）
webrtc:
  # TURN 服务器列表，支持多个
  turn-servers:
    - url: "39.107.117.20:3479?transport=udp"
      username: "realman"
      password: "TBdWj0HhwTK56AzK"
  # STUN 服务器列表（英文逗号分隔，拆分后作为数组下发）
  stun-servers: "stun:stun.l.google.com:19302"
  # 信令服务器配置
  # url: 信令服务器根地址（不含路径），密钥将通过 POST http://{url}:{port}/api/set_key 推送
  # 缓存 Key = iot:signaling:key:{url}，TTL=26h，每天凌晨 2:00 自动刷新
  signaling:
    server:
      url: 39.107.117.20
      port: 2233
      auto-push:
        enabled: false  # 测试环境禁用启动时推送，生产环境设为 true 或删除此行

logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN

# ===== 链路追踪（开发环境） =====
# 100% 采样率已在 application.yml 中设为默认值，此处无需重复。
# Loki / Zipkin 若尚未在本地启动，可取消下方注释以静默推送失败警告：
# loki:
#   url: ""   # 空字符串：loki4j 跳过推送，仅保留本地文件日志
# management:
#   zipkin:
#     tracing:
#       endpoint: ""  # 空字符串：Brave 跳过 Zipkin 上报
