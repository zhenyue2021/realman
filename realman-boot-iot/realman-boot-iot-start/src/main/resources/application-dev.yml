
spring:
  application:
    name: realman-iot-szy
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: 172.16.44.66:8848   # Nacos 地址
        namespace: public                # 先用 public，后面需要再拆 namespace
        group: REALMAN_GROUP             # 可自定义，比如 REALMAN_GROUP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.16.44.66:3306/jeecg-boot?characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: 172.16.44.66
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# mqtt
mqtt:
  enabled: false  # 临时禁用，避免启动失败
  broker:
    url: tcp://172.16.44.66:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 60

# 文件存储
minio:
  endpoint: http://172.16.44.66:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name: iot-firmware
  url-expire-days: 7

# 定时任务
xxl:
  job:
    enabled: true
    admin:
      addresses: http://172.16.44.66:9080/xxl-job-admin
    executor:
      appname: ${spring.application.name}
      port: 30007
    accessToken:

jeecg:
  shiro:
    excludeUrls: /internal/mqtt/**,/api/device/**,/api/ota/**

device:
  encrypt:
    enabled: false
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN
