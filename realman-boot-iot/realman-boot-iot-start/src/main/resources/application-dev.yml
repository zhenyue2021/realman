
spring:
  application:
    name: realman-iot
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: 172.16.44.66:8848
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:REALMAN_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: 172.16.44.66:8848
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:REALMAN_GROUP}
        file-extension: yaml
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.16.44.66:3306/jeecg-boot?characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: 172.16.44.66
      port: 6379
      password:
      database: 0
      timeout: 3000              # 命令超时 3s，防止 pipeline 连接 zombie 时线程永久阻塞
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
          max-wait: 2000         # 等待空闲连接超时 2s（连接池耗尽时快速失败）
        shutdown-timeout: 200ms  # 关闭时等待 200ms 让进行中的命令完成
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# RocketMQ（阿里云消息队列 RocketMQ 版 5.x，实例 rmq-cn-jjw4iubgh07，北京区域）
# 使用 rocketmq-v5-client-spring-boot-starter，通过 gRPC 端点（:8080）连接
rocketmq:
  producer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44
    topic: daily_GLN_PLATFORM
    ssl-enabled: true
    max-attempts: 3
    request-timeout: 3
  push-consumer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44

# 设为 true 时加载 Darwin RocketMQ Bean；未部署 RocketMQ 时请保持 false 或使用环境变量覆盖
darwin:
  integration:
    enabled: false
    auto-submit-minutes: 10   # Darwin 工单开启后超时自动提交阈值（分钟），0=禁用
    default-department-id: "1958496759810363394"
    default-department-name: "城市运营管理集团有限公司"

# mqtt
mqtt:
  enabled: false  # 临时禁用，避免启动失败
  high-freq-throttle-ms: 500  # slam/states 等高频 Topic 节流间隔(ms)：500=2次/秒，1000=1次/秒，0=不限
  collect-url-request-dedup-ms: 60000
  collect-url-device-throttle-ms: 45000
  watchdog:
    idle-timeout-seconds: 90  # 空闲超时(秒)=心跳间隔45s×2；须 < 设备离线判定阈值 300s
  broker:
    url: tcp://172.16.44.66:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 30

# 文件存储
minio:
  endpoint: http://172.16.44.66:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name:
    firmware: iot-firmware
    slam: iot-slam
  url-expire-days: 7

# 定时任务
xxl:
  job:
    enabled: true
    admin:
      addresses: http://172.16.44.66:9080/xxl-job-admin
    executor:
      appname: ${spring.application.name}
      port: 30007
    accessToken:

jeecg:
  shiro:
    excludeUrls: /internal/mqtt/**,/api/ota/**

device:
  encrypt:
    enabled: false
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

# Zipkin 链路数据清理策略
zipkin:
  cleanup:
    retention-days: 7        # 保留最近 N 天的链路数据，超期物理删除
    database: zipkin          # Zipkin 所在的 MySQL 数据库名
    batch-size: 5000          # 每批删除行数，避免大事务锁表

# WebRTC 服务配置（TURN / STUN 服务器，下发给机器人设备）
webrtc:
  # TURN 服务器列表，支持多个
  turn-servers:
    - url: "39.107.117.20:3479?transport=udp"
      username: "realman"
      password: "TBdWj0HhwTK56AzK"
  # STUN 服务器列表（英文逗号分隔，拆分后作为数组下发）
  stun-servers: "stun:stun.l.google.com:19302"
  # 信令服务器配置
  # url: 信令服务器根地址（不含路径），密钥将通过 POST http://{url}:{port}/api/set_key 推送
  # 缓存 Key = iot:signaling:key:{url}，TTL=26h，每天凌晨 2:00 自动刷新
  signaling:
    server:
      url: 39.107.117.20
      port: 8091
      auto-push:
        enabled: false  # 测试环境禁用启动时推送，生产环境设为 true 或删除此行

logging:
  level:
    org.jeecg.modules.device: DEBUG
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN

# ===== 链路追踪（开发环境） =====
# 100% 采样率已在 application.yml 中设为默认值，此处无需重复。
# Loki / Zipkin 若尚未在本地启动，可取消下方注释以静默推送失败警告：
# loki:
#   url: ""   # 空字符串：loki4j 跳过推送，仅保留本地文件日志
# management:
#   zipkin:
#     tracing:
#       endpoint: ""  # 空字符串：Brave 跳过 Zipkin 上报
