# 测试环境：数据源 / Redis / mqtt / minio / darwin / rocketmq 等由 Nacos realman-iot.yaml 管理。
# 勿在此重复上述配置，否则会覆盖 Nacos（与 application-prod.yml 规则相同）。
# Nacos 连接与 spring.config.import 见 application.yml。

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    org.jeecg.modules.device: info
    org.eclipse.paho: WARN
    com.baomidou.mybatisplus: WARN

# Loki / Zipkin 未部署时可取消注释以静默推送失败警告：
# loki:
#   url: ""
# management:
#   zipkin:
#     tracing:
#       endpoint: ""
