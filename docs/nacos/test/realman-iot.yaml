# Nacos 控制台：Group=REALMAN_GROUP，Namespace=public（留空），DataId=realman-iot.yaml
# 若 docker-compose 使用 lorete-* 服务名，请将 realman-* 替换为 lorete-*（如 lorete-mysql、lorete-nacos）。
# 禁止配置 server.servlet.context-path。

spring:
  cloud:
    nacos:
      discovery:
        server-addr: realman-nacos:8848
        group: REALMAN_GROUP
        username: nacos
        password: nacos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://realman-mysql:3306/realman-boot?characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root@123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
  data:
    redis:
      host: realman-redis
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          min-idle: 2
          max-active: 20
          max-idle: 10
          max-wait: 2000
        shutdown-timeout: 200ms
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

rocketmq:
  producer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44
    topic: daily_GLN_PLATFORM
    ssl-enabled: true
    max-attempts: 3
    request-timeout: 3
  push-consumer:
    endpoints: rmq-cn-jjw4iubgh07.cn-beijing.rmq.aliyuncs.com:8080
    namespace: rmq-cn-jjw4iubgh07
    access-key: MnZdSW6d1U3r1spP
    secret-key: 8scK0fvHum30JA44

darwin:
  integration:
    enabled: false
    auto-submit-minutes: 10
    default-department-id: "1958496759810363394"
    default-department-name: "城市运营管理集团有限公司"

mqtt:
  enabled: true
  high-freq-throttle-ms: 500
  collect-url-request-dedup-ms: 60000
  collect-url-device-throttle-ms: 45000
  sys-event-idempotent-seconds: 15
  status-offline-promote-throttle-ms: 60000
  emqx:
    api-url: http://realman-emqx:18083
    api-username: 1f36cde522c1f8ab
    api-password: ${EMQX_API_PASSWORD:SHe6JIzjwnBpOgOfksPMlIFGdYYHkybmXI00ARQKm9BG}
    api-timeout-ms: 5000
    ensure-platform-superuser: true
    reconcile-enabled: true
    reconcile-lock-seconds: 120
    reconcile-sidefx-idempotent-seconds: 60
  watchdog:
    idle-timeout-seconds: 90
  broker:
    url: tcp://realman-emqx:1883
    username: iot-platform
    password: realman123
    client-id: iot-platform-server
    qos: 1
    keep-alive: 30

minio:
  endpoint: http://realman-minio:9001
  access-key: minioadmin
  secret-key: realman123
  bucket-name:
    firmware: iot-firmware
    slam: iot-slam
  url-expire-days: 7

xxl:
  job:
    enabled: true
    admin:
      addresses: http://realman-xxljob:8080/xxl-job-admin
    executor:
      appname: realman-iot
      port: 30007
    accessToken:

jeecg:
  shiro:
    excludeUrls: /internal/mqtt/**,/api/ota/**

device:
  encrypt:
    enabled: false
  master:
    allow-default-device-code: false
  ota:
    chunk-temp-dir: /tmp/iot-ota-chunks

zipkin:
  cleanup:
    retention-days: 7
    database: zipkin
    batch-size: 5000
