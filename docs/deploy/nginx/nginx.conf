events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # 反代 WebSocket 时 Connection 使用客户端原始头 $http_connection（无需 map，避免无 map 模块或配置未同步时报 unknown variable）
    # whoami 上游（9091 跑在宿主机；容器内 nginx 经 host.docker.internal 访问，compose 需 extra_hosts: host-gateway）
    # 若仍 502：① 宿主机 ss -lntp | grep 9091 须为 0.0.0.0 而非仅 127.0.0.1 ② exec 进 nginx 容器 wget http://host.docker.internal:9091/api/v1/device/whoami ③ tail error.log
    upstream device_whoami_upstream {
        server host.docker.internal:9091;
        keepalive 8;
    }

    # 文件上传（realman-system 附件上传）
    client_max_body_size 100m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # ── 公共 Proxy Header ──────────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── 应用服务（context-path 原生匹配，直接透传）─────────────────
        # 前端 baseURL 统一指向 http://10.10.17.237，无需感知后端端口
        # proxy_http_version 1.1 + Upgrade/Connection 同时支持普通 HTTP 与 WebSocket 升级

        # IoT 设备 WS：单独 location（必须在 /realman-iot 之前），专线补 Upgrade / Connection，避免 DefaultHandshakeHandler 报 Upgrade=null
        location ^~ /realman-iot/ws/ {
            proxy_pass         http://realman-iot:8085;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
        }

        location /realman-boot {
            proxy_pass         http://realman-system:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $http_connection;
            proxy_read_timeout 3600s;
        }
        location /realman-iot {
            proxy_pass         http://realman-iot:8085;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $http_connection;
            proxy_read_timeout 3600s;
        }

        # ── 设备 whoami（gln_teleop：VITE_DEVICE_WHOAMI_URL=/api/v1/device/whoami）──
        location ^~ /api/v1/device/whoami {
            proxy_pass http://device_whoami_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── 前端静态站点（gln_teleop，子路径部署）──────────────────────────
        # 构建时需设置 Vite base=/gln_teleop/，否则静态资源会从 /assets 请求导致 404
        location = /gln_teleop {
            return 301 /gln_teleop/;
        }
        location ^~ /gln_teleop/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /gln_teleop/index.html;
        }

 # ── 前端静态站点（gln_admin，子路径部署）──────────────────────────
        # 构建时需设置 Vite base=/gln_admin/，否则静态资源会从 /assets 请求导致 404
        location = /gln_admin {
            return 301 /gln_admin/;
        }
        location ^~ /gln_admin/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /gln_admin/index.html;
        }
        # ── 管控台服务 ────────────────────────────────────────────────
        # ── Nacos (/nacos 是其原生 context-path，直接透传) ────────────
        # 访问地址：http://10.10.17.237/nacos
        location /nacos {
            proxy_pass       http://realman-nacos:8848;
            proxy_read_timeout 300s;
        }

        # ── XXL-Job Admin (/xxl-job-admin 是其原生 context-path) ──────
        # 访问地址：http://10.10.17.237/xxl-job-admin
        location /xxl-job-admin {
            proxy_pass http://realman-xxljob:8080;
        }

        # ── Grafana（子路径，与 serve_from_sub_path + root_url 一致，参考官方 subpath 示例）──
        # 访问：http://<host>/grafana/  ；须与 GF_SERVER_ROOT_URL、GF_SERVER_DOMAIN 中的主机一致
        location = /grafana {
            return 301 /grafana/;
        }
        # Grafana Live WebSocket 单独写一段，与官方 tutorial 一致
        location /grafana/api/live/ {
            proxy_pass         http://realman-grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $http_connection;
        }
        location /grafana/ {
            proxy_pass         http://realman-grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Zipkin (配合 ZIPKIN_UI_BASEPATH=/zipkin) ──────────────────
        # 访问地址：http://10.10.17.237/zipkin
        location /zipkin {
            proxy_pass http://realman-zipkin:9411;
        }

        # ── EMQX Dashboard（子路径 /emqx/ → 上游根路径，并修正 SPA 资源根）
        # 勿用 sub_filter 匹配不完整的 <head，否则原 HTML 里会多出一个 `>` 字符（顶角显示 ">"）
        # 在 </head> 前插入 <base>，避免重复 `>` 且子路径下资源引用正确
        # 访问地址：http://<host>/emqx/
        location /emqx/ {
            proxy_pass         http://realman-emqx:18083/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_redirect     http://realman-emqx:18083/ /emqx/;
            proxy_set_header   Accept-Encoding "";
            sub_filter_once      on;
            sub_filter           '</head>' '<base href="/emqx/"/></head>';
        }
        location = /emqx {
            return 301 /emqx/;
        }

        # ── MinIO Console (路径剥离代理，配合 MINIO_BROWSER_REDIRECT_URL) ─
        # 访问地址：http://10.10.17.237/minio/
        # 注意：尾部斜杠必须保留，SPA 路由依赖此前缀
        location /minio/ {
            proxy_pass         http://realman-minio:9001/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_redirect     http://realman-minio:9001/ /minio/;
        }
        location = /minio {
            return 301 /minio/;
        }
    }
}
