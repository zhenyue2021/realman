# Grafana 单机部署，含 Loki 数据源 + Zipkin derivedFields 预置配置
#
# 启动：docker compose up -d
# UI:   http://<服务器IP>:3000   默认账号 admin / admin（首次登录强制改密）
#
# 依赖：Loki 已在 172.16.44.66:3100，Zipkin 已在 172.16.44.66:9411
# 数据源通过 provisioning/datasources/ 目录自动注入，无需手动在 UI 操作。

services:
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_PASSWORD: "admin"       # 生产环境请修改
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_EXPLORE_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning  # 数据源 / Dashboard 自动注入

volumes:
  grafana-data:
