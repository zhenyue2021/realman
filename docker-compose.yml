services:

  # ============================================================
  # 基础设施 — 数据存储
  # ============================================================

  mysql:
    image: mysql:8.0
    container_name: lorete-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root@123456
      TZ: Asia/Shanghai
    volumes:
      - /ssd/lorete/mysql/data:/var/lib/mysql
      - /ssd/lorete/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - /ssd/lorete/mysql/logs:/var/log/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --max_connections=500
      --innodb-buffer-pool-size=512M
    networks:
      - lorete-net

  redis:
    image: redis:7.2
    container_name: lorete-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - /ssd/lorete/redis/data:/data
      - /ssd/lorete/redis/conf/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    environment:
      TZ: Asia/Shanghai
    networks:
      - lorete-net

  # ============================================================
  # 基础设施 — 服务发现 & 配置中心
  # ============================================================

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: lorete-nacos
    restart: always
    depends_on:
      - mysql
    environment:
      TZ: Asia/Shanghai
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: lorete-mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root@123456
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"   # HTTP 控制台 / 注册中心
      - "9848:9848"   # gRPC（服务发现）
    volumes:
      - /ssd/lorete/nacos/logs:/home/nacos/logs
    networks:
      - lorete-net

  # ============================================================
  # 基础设施 — IoT 消息总线（MQTT）
  # 启动后需在 Dashboard(18083) 中创建认证用户：
  #   用户名: iot-platform  密码: realman123
  # ============================================================

  emqx:
    image: emqx:5.8
    container_name: lorete-emqx
    restart: always
    environment:
      TZ: Asia/Shanghai
      EMQX_NODE__NAME: emqx@lorete-emqx
    ports:
      - "1883:1883"     # MQTT over TCP
      - "8083:8083"     # MQTT over WebSocket
      - "8883:8883"     # MQTT over TLS
      - "8084:8084"     # MQTT over WebSocket TLS
      - "18083:18083"   # Dashboard（默认账号 admin/public）
    volumes:
      - /ssd/lorete/emqx/data:/opt/emqx/data
      - /ssd/lorete/emqx/log:/opt/emqx/log
    networks:
      - lorete-net

  # ============================================================
  # 基础设施 — 对象存储（固件 / SLAM 地图 / 通用文件）
  # S3 API 端口映射为宿主机 9001，与应用配置 endpoint:9001 一致。
  # Console 访问：http://<host>:9090  账号: minioadmin / realman123
  # 首次启动后需手动创建 Bucket：iot-firmware、iot-slam
  # ============================================================

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: lorete-minio
    restart: always
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: realman123
    ports:
      - "9001:9000"   # S3 API（应用配置 endpoint: http://<host>:9001）
      - "9090:9001"   # Web Console
    volumes:
      - /ssd/lorete/minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - lorete-net

  # ============================================================
  # 基础设施 — 定时任务调度（XXL-Job）
  # 控制台：http://<host>:9080/xxl-job-admin  账号: admin / 123456
  # 首次启动前需在 MySQL 中创建 xxl_job 数据库并导入初始化 SQL。
  # ============================================================

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: lorete-xxljob
    restart: always
    depends_on:
      - mysql
    environment:
      TZ: Asia/Shanghai
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://lorete-mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root@123456
        --xxl.job.accessToken=
    ports:
      - "9080:8080"
    volumes:
      - /ssd/lorete/xxljob/logs:/data/applogs
    networks:
      - lorete-net

  # ============================================================
  # 视频流媒体服务（按需启用，取消注释即可）
  # 推流端口：554(RTSP)  HTTP API/拉流：8082  HTTPS拉流：8443
  # 启动后需配置 secret（对应应用配置 device.stream.secret）
  # ============================================================

  # zlmediakit:
  #   image: zlmediakit/zlmediakit:master
  #   container_name: lorete-zlmediakit
  #   restart: always
  #   environment:
  #     TZ: Asia/Shanghai
